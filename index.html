<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Formula Library</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Top lapis-lazuli strip */
    .lapis-strip {
      width: 100%;
      height: auto;                   /* let height adjust naturally */
      max-height: 443px;              /* don't exceed original image height */
      background-image: url('ss.jpg'); /* your uploaded image */
      background-size: 100% auto;     /* full width, natural height */
      background-repeat: no-repeat;
      background-position: center;
      position: relative;
    }

    /* Heading text: white with dark blue outline */
    .site-heading {
      position: absolute;
      top: 20px;                     /* padding from top of strip */
      left: 20px;                    /* padding from left */
      font-size: 36px;               
      font-weight: bold;
      color: white;                  
      -webkit-text-stroke: 3px #00008B; /* dark blue thick outline */
      text-stroke: 3px #00008B;         /* fallback */
      z-index: 2;                    /* ensure it stays above background */
    }

    /* Optional: make buttons stay on white background */
    main {
      z-index: 1;
    }
  </style>
</head>
<body class="bg-white flex flex-col items-center min-h-screen">

  <!-- Top lapis-lazuli strip -->
  <div class="lapis-strip">
    <div class="site-heading">Site Heading</div>
  </div>

  <!-- Main content: buttons -->
  <main class="flex flex-col items-center justify-center mt-20 space-y-8">
    <a href="basic.html" target="_blank">
      <button class="px-10 py-4 bg-blue-600 hover:bg-blue-500 text-white text-2xl rounded-2xl shadow-lg transition transform hover:-translate-y-0.5">
        Basic
      </button>
    </a>
    <a href="advanced.html" target="_blank">
      <button class="px-10 py-4 bg-indigo-600 hover:bg-indigo-500 text-white text-2xl rounded-2xl shadow-lg transition transform hover:-translate-y-0.5">
        Advanced
      </button>
    </a>
  </main>

</body>
</html>
