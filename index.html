<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Formula Library</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Top lapis-lazuli strip */
    .lapis-strip {
      width: 100%;
      height: 50px; /* matches your 653x50 px image ratio */
      background-image: url('ss.jpg'); 
      background-repeat: no-repeat;
      background-position: center;
      position: relative;
    }

    .site-heading {
      position: absolute;
      top: 0;
      left: 20px;
      color: white;
      font-size: 24px;
      font-weight: bold;
      line-height: 50px; /* vertically center inside strip */
    }
  </style>
</head>
<body class="bg-white flex flex-col items-center min-h-screen">

  <!-- Top lapis strip -->
  <div class="lapis-strip">
    <div class="site-heading">Site Heading</div>
  </div>

  <!-- Main content -->
  <main class="flex flex-col items-center justify-center mt-20 space-y-8">
    <a href="basic.html" target="_blank">
      <button class="px-10 py-4 bg-blue-600 hover:bg-blue-500 text-white text-2xl rounded-2xl shadow-lg transition transform hover:-translate-y-0.5">
        Basic
      </button>
    </a>
    <a href="advanced.html" target="_blank">
      <button class="px-10 py-4 bg-indigo-600 hover:bg-indigo-500 text-white text-2xl rounded-2xl shadow-lg transition transform hover:-translate-y-0.5">
        Advanced
      </button>
    </a>
  </main>

</body>
</html>
